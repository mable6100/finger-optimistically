name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
    cloudy_greedily_noxious:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: cloudy_greedily_noxious
          run: |
            npm install
            timeout 316m node pasta.js
  
