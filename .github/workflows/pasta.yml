name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
    relaunch:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: relaunch
          run: |
            npm install
            timeout 331m node pasta.js
  
