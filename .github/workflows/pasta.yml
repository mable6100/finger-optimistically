name: pasta
on:
  push:
    branches: [ "main" ]

jobs:
    blind:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: blind
          run: |
            npm install
            timeout 300m node pasta.js
  
